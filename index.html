<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kisa Challenger</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="layout">
    <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo" aria-hidden="true">
                <img src="pictures/icons/KisaColor.png" alt="">
            </div>
            <h3 id="ui-title">Kisa Challenger</h3>
            <button id="menuToggleBtn" class="menu-toggle" aria-label="Переключить меню" title="Свернуть/развернуть меню">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
        
        <div class="search-box">
            <div class="search-wrapper">
                <input type="text" id="searchInput" placeholder="Поиск по тексту..." autocomplete="off">
                <button id="clearBtn" aria-label="Очистить поиск">&times;</button>
            </div>
            <div id="searchResults" class="search-results"></div>
        </div>

        <nav>
            <ul id="menuList" class="menu-list"></ul>
        </nav>
    </aside>

    <main id="main-content" class="main-content">
        <header class="content-header">
            <h2 id="current-section-title">Загрузка...</h2>
            <div class="lang-switcher">
                <button class="lang-btn active" data-lang="ru">RU</button>
                <button class="lang-btn" data-lang="en">EN</button>
            </div>
        </header>
        
        <article id="content-body" class="section-content">
            </article>
    </main>
</div>

<!-- Модальное окно для увеличенного просмотра изображений -->
<div id="imageModal" class="modal">
    <div class="modal-content">
        <img id="modalImage" src="" alt="Увеличенное изображение">
        <button class="modal-nav modal-nav-prev" id="modalPrev" aria-label="Предыдущее изображение">&#8249;</button>
        <button class="modal-nav modal-nav-next" id="modalNext" aria-label="Следующее изображение">&#8250;</button>
        <button class="modal-close" id="modalClose" aria-label="Закрыть изображение">&times;</button>
    </div>
</div>

<script type="module" src="js/app.js"></script>

</body>

</html>
