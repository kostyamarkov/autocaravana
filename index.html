<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Инструкция Автодома</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="layout">
    <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h3 id="ui-title">Инструкция Автодома</h3>
        </div>
        
        <div class="search-box">
            <div class="search-wrapper">
                <input type="text" id="searchInput" placeholder="Поиск по тексту..." autocomplete="off">
                <button id="clearBtn" aria-label="Очистить поиск">&times;</button>
            </div>
            <div id="searchResults" class="search-results"></div>
        </div>

        <nav>
            <ul id="menuList" class="menu-list"></ul>
        </nav>
    </aside>

    <main id="main-content" class="main-content">
        <header class="content-header">
            <h2 id="current-section-title">Загрузка...</h2>
            <div class="lang-switcher">
                <button class="lang-btn active" data-lang="ru">RU</button>
                <button class="lang-btn" data-lang="en">EN</button>
            </div>
        </header>
        
        <article id="content-body" class="section-content">
            </article>
    </main>
</div>

<script type="module" src="js/app.js"></script>

</body>
</html>
